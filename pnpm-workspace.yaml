packages:
  - "apps/*"
  - "packages/*"

# Dependencies allowed to run install/build scripts (pnpm security gate).
# All of these are trusted, first-party toolchain packages.
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  msgpackr-extract: true
  prisma: true
  sharp: true
  unrs-resolver: true
