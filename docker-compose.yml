# Local development infrastructure for LeadArrow.
# Brings up the datastores the API depends on. Application services run on the
# host via `pnpm dev` so hot-reload stays fast; only stateful infra lives here.
#
#   docker compose up -d      # start Postgres + Redis
#   docker compose down       # stop (use `-v` to also wipe data volumes)

services:
  postgres:
    image: postgres:16-alpine
    container_name: leadarrow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: leadarrow
      POSTGRES_PASSWORD: leadarrow
      POSTGRES_DB: leadarrow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U leadarrow -d leadarrow']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: leadarrow-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
